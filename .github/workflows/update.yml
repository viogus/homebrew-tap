 name: Update Hermes Agent Cask
 
 on:
   schedule:
     - cron: "0 8 * * *"  # daily at 08:00 UTC
   workflow_dispatch:      # manual trigger
 
 jobs:
   update:
     runs-on: macos-latest
     permissions:
       contents: write
     steps:
       - uses: actions/checkout@v4
 
       - name: Check for new release
         id: check
         run: |
           # Get latest release info from GitHub API
           RELEASE_JSON=$(curl -sL "https://api.github.com/repos/NousResearch/hermes-agent/releases/latest")
           TAG=$(echo "$RELEASE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
           BODY=$(echo "$RELEASE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")
           LATEST_VERSION=$(echo "$BODY" | grep -oE 'Hermes Agent v([0-9]+\.[0-9]+\.[0-9]+)' | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
 
           # Get current version from cask
           CURRENT_VERSION=$(grep -oE 'version "([0-9]+\.[0-9]+\.[0-9]+)"' Casks/hermes-agent.rb | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
 
           echo "tag=$TAG" >> "$GITHUB_OUTPUT"
           echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
           echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
 
           echo "Current: $CURRENT_VERSION, Latest: $LATEST_VERSION"
 
           if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ] && [ -n "$LATEST_VERSION" ]; then
             echo "update_needed=true" >> "$GITHUB_OUTPUT"
             echo "::notice::New version $LATEST_VERSION available (current: $CURRENT_VERSION)"
           else
             echo "update_needed=false" >> "$GITHUB_OUTPUT"
             echo "::notice::Already up to date ($CURRENT_VERSION)"
           fi
 
       - name: Download DMG and compute SHA256
         if: steps.check.outputs.update_needed == 'true'
         id: sha
         run: |
           curl -sL "https://hermes-assets.nousresearch.com/Hermes-Setup.dmg" -o /tmp/Hermes-Setup.dmg
           SHA256=$(shasum -a 256 /tmp/Hermes-Setup.dmg | awk '{print $1}')
           echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
           echo "SHA256: $SHA256"
 
       - name: Update cask file
         if: steps.check.outputs.update_needed == 'true'
         run: |
           VERSION="${{ steps.check.outputs.latest_version }}"
           SHA256="${{ steps.sha.outputs.sha256 }}"
 
           sed -i '' "s/version \"[0-9.]*\"/version \"$VERSION\"/" Casks/hermes-agent.rb
           sed -i '' "s/sha256 \"[a-f0-9]*\"/sha256 \"$SHA256\"/" Casks/hermes-agent.rb
 
           echo "Updated cask to version $VERSION"
           cat Casks/hermes-agent.rb
 
       - name: Commit and push
         if: steps.check.outputs.update_needed == 'true'
         run: |
           VERSION="${{ steps.check.outputs.latest_version }}"
           git config user.name "github-actions[bot]"
           git config user.email "github-actions[bot]@users.noreply.github.com"
           git add Casks/hermes-agent.rb
           git commit -m "hermes-agent: bump to $VERSION"
           git push
